server {
    listen 80;
    server_name _;

    # CloudFront forwards HTTP to the origin — SSL terminates at CloudFront.
    # Do not redirect to HTTPS here; that would create a redirect loop.

    # Pass /api and /public to the Node.js app
    location ~ ^/(api|public)/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # Block direct access to anything else (all static files come via CloudFront → S3)
    location / {
        return 404;
    }
}
