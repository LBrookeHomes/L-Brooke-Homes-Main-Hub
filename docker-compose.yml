version: '3.9'

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: weebrook
      POSTGRES_PASSWORD: weebrook
      POSTGRES_DB: weebrook
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: weebrook
      MINIO_ROOT_PASSWORD: weebrook123
      MINIO_DEFAULT_BUCKETS: weebrook-assets
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # Web UI
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
