name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

# Prevent two backend deploys from running simultaneously.
# Migrations must never run concurrently against the same database.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          # Abort on any error; pm2 restart only runs if build + migrations pass.
          script: |
            set -e
            cd /home/ubuntu/weebrook

            echo "→ Pulling latest code"
            git pull origin main

            echo "→ Installing dependencies"
            npm ci

            echo "→ Building backend"
            npm run build --workspace=backend

            echo "→ Running migrations"
            npm run migrate:deploy --workspace=backend

            echo "→ Restarting API"
            pm2 restart weebrook-api

            echo "✓ Deploy complete"
