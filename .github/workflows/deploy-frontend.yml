name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# Prevent two frontend deploys from running simultaneously.
# A second push while a deploy is in progress queues behind it.
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Content-hashed assets (JS/CSS bundles) can be cached indefinitely.
      # Vite writes these to assets/ with a hash in the filename so stale
      # cache hits are impossible.
      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync frontend/dist/assets/ s3://${{ secrets.S3_BUCKET }}/assets/ \
            --cache-control "public,max-age=31536000,immutable"

      # Root-level files (index.html, registerSW.js, manifest.webmanifest,
      # favicon) are NOT content-hashed, so browsers must revalidate on every
      # load. --delete here removes any stale root files from previous deploys.
      - name: Sync root files (no cache)
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --exclude "assets/*" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
